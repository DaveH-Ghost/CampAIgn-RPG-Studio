[project]
name = "realm-studio"
version = "0.7.0"
description = "Reference GM web app for Realm-Fabric — demonstrates the realm-fabric Python library"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "realm-fabric>=0.7.2",
    "fastapi>=0.115.0",
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.32.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "httpx>=0.28.0",
]

[project.scripts]
realm-studio = "backend.main:main"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend"]

[tool.uv]
package = true

# During migration (until realm-fabric 1.0 on PyPI with full exports), resolve the
# sibling engine checkout. Remove this block and re-lock from PyPI at 1.0 cutover.
[tool.uv.sources]
realm-fabric = { path = "../Realm-Fabric", editable = true }
